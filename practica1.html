<!DOCTYPE html>
<!-- Le dice al navegador que el documento está escrito en *HTML5*.
Es importante porque asegura que la página se muestre correctamente.-->
<html lang="en">
    <!-- 
Es la *etiqueta raíz*, o sea, donde empieza todo el documento HTML. -->
<head>
    <!-- Contiene información *interna* de la página que el usuario no ve directamente.
Aquí van configuraciones, título, enlaces a estilos, etc.-->
    <meta charset="UTF-8">
    <!-- Define la codificación de caracteres.
Permite usar correctamente letras como: *ñ, tildes (á, é, í)*, etc. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 
Hace que la página sea *responsive* (adaptable a celulares y pantallas).
Sin esto, la página puede verse mal en móviles-->
    <title>Document</title>
    <!-- 
    Es el *título de la página*, el que aparece en la pestaña del navegador.-->
</head>
<!-- Cierra la parte de configuración.-->
<body>
    <!-- Aquí va *todo lo que el usuario ve*:
textos, imágenes, botones, etc.-->
    
</body>
<!-- Cierra el contenido visible.-->
</html>
<!-- Cierra todo el documento HTML.-->
