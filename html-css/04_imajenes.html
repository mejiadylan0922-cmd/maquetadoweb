<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imajenes</title>
    <!-- https://w7.pngwing.com/pngs/491/596/png-transparent-charlotte-hornets-hd-logo.png -->
</head>
<body>
    <!-- etiquetas de bloque y etiquetas de linea -->
    <h1>imajenes</h1>
    <!-- las imajenes se insertan en html utilizando la etiqueta img. esta eiqueta es un elemento vacio,lo que significa que no tiene una etiqueta de cierre, la sintaxis basica para insertar una imajen es : -->
    
    <!-- Vale la pena recordar que el atributo title propociona un tooltip que se muestra cuando el usuario pasa el raton sobre la imagen. -->
    <img src="hornets.png" alt="logotipo de los hornets"title="logo hornets" width="200" height="200">
    <!-- Para que los lectores de pantalla puedan saber de que se trata la imagen el atributo alt (Alternative Text) es muy importante puesto que proporciona una descripción textual de la imagen para accesibilidad y como fallback si no se carga. El texto alternativo debe ser conciso y descriptivo, y debe transmitir la informacion esencial que la imagen representa. Por ejemplo, si la imagen muestra un aprendiz, el texto alternativo podría ser "Aprendiz", el atributos alt proporciona una descripcion en caso de que no se pueda cargar -->
</body>
</html>
