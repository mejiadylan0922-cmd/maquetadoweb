    <!-- a (anchor) significa ancla. metafora:como en un barco te mantiene en una ubicacion especifica un ancla es justamente para que el usuario sepa hacia donde buscar un recurso o hacia donde navegar en la pagina web -->
    <!-- los atributos son caracteristicas que definen el comportamiento y la apariencia de los elementos en este caso el atributo herf vuelve funcional a la etiqueta es por esta razon que se utiliza en en maquetado y no en el css dado que no es una caracteristica visual -->
    <!-- herf (hyper reference)es la referencia a un recurso,es decir, el destino del enlace -->
    <!-- lo que esta dentro de la etiqueta es el texto visible que el usuario vera en la pagina web mientras que lo esta dentro de herf es la referencia al recurso al que apunta al enlace-->
    <h2 title="titulo de la pagina">enlaces o anclas</h2>
    <!-- por otra parte, el atributo title proporciona un texto de ayuda que se muestra cuando el usuario pasa por el mouse sobre el enlace , la tecnologia de asistencia como lectores de pantalla utilizan este atrinuto para proporcionar informacion adicional al usario. en el cso de personas esto les permite acceder a informacion adiciional sobre el enlace. -->
