<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>rutas</title>
</head>
<body>

    <h1>explicacion: rutas absolutas y relativas</h1>

    <section>
        <h2>rutas absolutas</h2>
        <!--ruta completa a un recurso en un servidor externo. la ruta absoluta es la URL completa del recurso, esta no se modifica segun la ubicacion del archivo actual  -->
        <p>
            para ir a un sitio externo,como el catalogo global de repuestos, usamos la URL completa :
            <a href="https://www.shimano.com">visitar a shimano internacional</a>
        </p>

        <img src="hornets.png" alt="imajen html desde un servidorr externo" width="300" height="200" title="html 5">

        <section>
        <h2>Rutas Relativas</h2>
        <!-- Ruta relativa a un recurso dentro del mismo proyecto. La ruta relativa se basa en la ubicación del archivo actual, y se ajusta según la estructura de carpetas-->

        <p>
            Ir a la página de <a href="04_inline_inblock.html">Inline vs Block</a>
            <!-- Funciona si hay un archivo llamado '04_inline_inblock.html' en la misma carpetas del proyecto-->
        </p>
        
        <p>
            Ver foto de tecnología <a href="hornets.png">CSS 3</a>
            <!-- Funciona si hay una imagen llamada 'imagen_css.png' en la carpeta llamada 'img'. -->
        </p>
        
    </section>
</body>
</html>
