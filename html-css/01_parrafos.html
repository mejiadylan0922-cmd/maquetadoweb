<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>parrafos y encabezados</title>
</head>
<body>
    <!-- titulos o encabezados :
    se tiene 6 tipos de encabezados, desd el h1 hasta el h6 -->
    <!-- (h$*6)crea 6 titulo en orden del 1 al 6 Emmet -->
    <h1>titulo</h1>
    <h2>subtitulo</h2>
    <h3>subtitulo</h3>
    <h4>subtitulo</h4>
    <h5>subtitulo</h5>
    <h6>subtitulo</h6>

    <!-- desde el h2 el h6, se puede utilizar las veces  que sean nesesarias segun el contenido que se quiera recrear -->

    <!--parrafo: los parrafos deben tener una idea o un punto especifico.
    cada parrafo escriyo debe de contener un concepto,una idea.es decir,puede describir una seccion o un elemento hasta un mensaje en el chat por ejemplo en una seccion se habla sobre los beneficios del ejercicio: 
    un parrafo puede tratar de mejorar la salud cardiovascular y otro puede ser sobre los beneficios y cuidados de la salud mental.finalmente , debe existir un motivo para que exista un parrafo .-->
    <p>
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Ratione at rem sequi. Dolore cumque aperiam nam facere nostrum? Fugiat quod error nihil quas deleniti quaerat? Quis deserunt dolorem sapiente ad.
    </p>
    <!-- (CTRL+SHIFT+P) o (ALT+Z) Ajusta el contenido del párrafo a la ventana del editor -->
<!--Existen algunas tecnologías de asistencia como lectores de pantalla, que ayudan a las personas con discapacidad visual a navegar por el contenido web.
Por ejemplo: cuando estas tecnologías leen el h1 dede la página, entienden de que trata la página por el h1. Por temas de accesibilidad web es importante que se utilice solo un h1 por página. -->
</body>
</html>
